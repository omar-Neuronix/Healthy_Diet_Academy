<body>
    <div class="top-header">
        <a class="site-link" href="index.html" aria-label="العودة للصفحة الرئيسية">
            <img src="3.png" alt="Healthy Diet Academy">
        </a>
    </div>

    <main>
        <div class="verify-card">
        <div class="logo-box">
            <img src="3.png" alt="Healthy Diet Academy">
        </div>
        <h2>التحقق من مصداقية الشهادة</h2>
        <p>أدخل الرمز الفريد المطبوع على الشهادة للتأكد من بيانات الخريج فوراً.</p>

        <input type="text" id="certIdInput" placeholder="مثال: HDA-2026-01">
        <button id="checkButton" type="button">تحقق الآن</button>

        <div id="resultBox" class="result-box"></div>
    </div>

    <div class="modal-overlay" id="certificateModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal" aria-label="إغلاق">×</button>
            <img id="certificateImage" class="modal-image" src="" alt="صورة الشهادة">
            <button class="download-btn" id="downloadCertificateBtn" type="button">تحميل الصورة</button>
        </div>
    </div>

    <script>
        // API Configuration (ديناميكي لتفادي كسر التحقق عند تغيير الدومين)
const API_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:3000'
            : window.location.origin;

        const certIdInput = document.getElementById("certIdInput");
        const checkButton = document.getElementById("checkButton");
        const resultBox = document.getElementById("resultBox");
        const certificateModal = document.getElementById("certificateModal");
        const certificateImage = document.getElementById("certificateImage");
        const closeModal = document.getElementById("closeModal");
        const downloadCertificateBtn = document.getElementById("downloadCertificateBtn");

        function openCertificateModal(imageSrc) {
            certificateImage.src = imageSrc;
            certificateModal.classList.add("show");
        }

        function closeCertificateModal() {
            certificateModal.classList.remove("show");
        }

        function downloadImage(url, name) {
            const link = document.createElement("a");
            link.href = url;
            link.download = name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function checkCertificate() {
            const inputVal = certIdInput.value.trim().toUpperCase();

            resultBox.style.display = "none";
            resultBox.className = "result-box";

            if (inputVal === "") {
                resultBox.style.display = "block";
                resultBox.classList.add("error");
                resultBox.innerHTML = "يرجى إدخال رمز الشهادة أولاً.";
                return;
            }

            try {
                // إظهار رسالة التحميل
                resultBox.style.display = "block";
                resultBox.className = "result-box";
                resultBox.innerHTML = "⏳ جاري البحث عن الشهادة...";

                // استدعاء API
                const response = await fetch(`${API_URL}/api/cert/${inputVal}`);
                const data = await response.json();

                if (data.success && data.data) {
                    const cert = data.data;
                    resultBox.className = "result-box success";
                    resultBox.innerHTML = `
                        <strong>✅ شهادة معتمدة وصالحة</strong><br><br>
                        <b>اسم الخريج:</b> ${cert.studentName}<br>
                        <b>البرنامج التدريبي:</b> ${cert.courseName}<br>
                        <b>تاريخ الإصدار:</b> ${formatDate(cert.issueDate)}<br>
                        <b>صلاحيتها حتى:</b> ${formatDate(cert.expiryDate)}<br>
                        <b>الدرجة:</b> ${cert.score}/100<br>
                        <b>التقدير العام:</b> ${cert.grade}<br>
                        <b>الختم:</b> ${cert.stamp}
                    `;
                    openCertificateModal(cert.certificateImage);
                } else {
                    resultBox.className = "result-box error";
                    resultBox.innerHTML = `❌ ${data.message || 'الرمز غير صحيح أو الشهادة غير مسجلة في أنظمتنا.'}`;
                }
            } catch (error) {
                console.error('خطأ:', error);
                resultBox.className = "result-box error";
                resultBox.innerHTML = `❌ حدث خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.`;
            }
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('ar-SA', options);
        }

        checkButton.addEventListener("click", checkCertificate);
        certIdInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkCertificate();
            }
        });

        closeModal.addEventListener("click", closeCertificateModal);
        certificateModal.addEventListener("click", function (event) {
            if (event.target === certificateModal) {
                closeCertificateModal();
            }
        });
        downloadCertificateBtn.addEventListener("click", function () {
            const currentImage = certificateImage.src;
            if (currentImage) {
                downloadImage(currentImage, "certificate.png");
            }
        });
    </script>
